<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            background: white;
            margin: 10px auto;
            padding: 15px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📋 All Feedback</h2>

    {% for row in data %}
        <div class="card">
            <b>{{row[1]}}</b>
            <p>{{row[2]}}</p>
        </div>
    {% endfor %}

    <a href="/">⬅ Back</a>
</div>

</body>
</html>
