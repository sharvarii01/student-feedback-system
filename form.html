<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>💬 Feedback Form</h2>

    <form action="/submit" method="post">
        <input type="text" name="name" placeholder="Your Name"><br>
        <textarea name="message" placeholder="Your Feedback"></textarea><br>
        <button type="submit">Submit</button>
    </form>

    <a href="/view">View Feedback</a>
</div>

</body>
</html>
